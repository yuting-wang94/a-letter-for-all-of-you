<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unlock your letter💌</title>
  <script src="https://kit.fontawesome.com/18b2d5e96c.js" crossorigin="anonymous"></script>
  <script src="unlock.js" defer></script>
  <link rel="stylesheet" href="unlock.css">
</head>
<body>
  <form>
    <div class="unlock-container">
      <h2>LOGIN<i class="fa-solid fa-lock"></i></h2>
      <div class="login-pic">
        <img class="dani-login" src="images/dani-login.png"  loading="lazy">
        <i class="fa-solid fa-heart"></i>
      </div>
      
      
      <p>*password hint: Q1 + Q2 + Q3</p>
      <p>Q1: The city we met in</p>
      <p>Q2: The date we got together</p>
      <p>Q3: The date of my birthday</p>
      
    </div>
    
    <div>
        <label for="firstname-input">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Z"/></svg>
        </label>
        <input type="text" name="firstname" id="firstname-input" placeholder="Firstname">
      </div>
    <div>
      <label for="password-input">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm296.5-223.5Q560-327 560-360t-23.5-56.5Q513-440 480-440t-56.5 23.5Q400-393 400-360t23.5 56.5Q447-280 480-280t56.5-23.5ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/></svg>
      </label>
      <input type="password" name="password" id="password-input" placeholder="Password">

    </div>
    <button type="submit">Unlock</button>
    <p id="forgot-pw">forgot your password?</p>
    
  </form>
  

</body>
</html>
